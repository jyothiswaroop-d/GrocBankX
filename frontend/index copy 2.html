<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GrocBankX</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f4f6f8;
}

/* HEADER */
header {
  background: #ffffff;
  padding: 15px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

header h1 span { color: #2ecc71; }

button {
  background: #2ecc71;
  border: none;
  color: white;
  padding: 10px;
  border-radius: 6px;
  cursor: pointer;
  width: 100%;
}

/* MAIN */
.container {
  max-width: 1200px;
  margin: auto;
  padding: 20px;
}

/* PRODUCTS */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill,minmax(180px,1fr));
  gap: 15px;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 10px;
  text-align: center;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

.emoji { font-size: 40px; }
.price { color: #2ecc71; font-weight: bold; }

/* PANELS */
.panel {
  position: fixed;
  top: 0;
  right: 0;
  width: 360px;
  height: 100vh;
  background: #f9f9f9;
  box-shadow: -4px 0 12px rgba(0,0,0,0.2);
  transform: translateX(100%);
  transition: transform 0.3s ease;
  z-index: 1000;
  padding: 20px;
}

.panel.show { transform: translateX(0); }

/* BACKDROP */
.backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  display: none;
  z-index: 900;
}
.backdrop.show { display: block; }

/* CART */
.cart-item {
  background: white;
  padding: 10px;
  border-radius: 6px;
  margin-bottom: 8px;
  display: flex;
  justify-content: space-between;
}

/* PAYMENT CARD */
.payment-card {
  background: linear-gradient(135deg,#2d6cdf,#4c89ff);
  color: white;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 15px;
}

input {
  width: 100%;
  padding: 8px;
  margin-bottom: 10px;
}

/* CAMERA MODAL */
.camera-modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 2000;
}

.camera-modal.show { display: flex; }

.camera-content {
  background: white;
  padding: 20px;
  border-radius: 12px;
  width: 320px;
  text-align: center;
}

.camera-content video {
  width: 100%;
  border-radius: 8px;
  border: 2px solid #333;
  margin: 10px 0;
}

.warning-text {
  color: #e74c3c;
  font-size: 14px;
}

.cancel {
  background: #999;
}
</style>
</head>

<body>

<header>
  <h1>🛒 Groc<span>BankX</span></h1>
  <button onclick="openCart()">Cart (<span id="cartCount">0</span>)</button>
</header>

<div class="container">
  <h2>Fresh Products</h2>
  <div class="grid" id="products"></div>
</div>

<div class="backdrop" id="backdrop" onclick="closePanels()"></div>

<!-- CART -->
<div class="panel" id="cartPanel">
  <h2>Your Cart</h2>
  <div id="cartItems"></div>
  <h3>Total: $<span id="total">0</span></h3>
  <button onclick="openPayment()">Proceed to Payment</button>
</div>

<!-- PAYMENT -->
<div class="panel" id="paymentPanel">
  <h2>Payment</h2>

  <div class="payment-card">
    <p>BankX Credit</p>
    <h3 id="cardPreview">•••• •••• •••• ••••</h3>
    <p id="namePreview">YOUR NAME</p>
    <p id="expiryPreview">MM/YY</p>
  </div>

  <input placeholder="Card Number" oninput="updateCard(this.value)">
  <input placeholder="Cardholder Name" oninput="namePreview.textContent=this.value.toUpperCase()">
  <input placeholder="MM/YY" oninput="expiryPreview.textContent=this.value">
  <input placeholder="CVV" type="password">

  <h3>Pay $<span id="payAmount"></span></h3>
  <button onclick="pay()">Pay Now</button>
</div>

<!-- CAMERA MODAL -->
<div id="cameraModal" class="camera-modal">
  <div class="camera-content">
    <h3>🔐 Identity Verification</h3>
    <p class="warning-text">Suspicious transaction detected</p>
    <video id="cameraVideo" autoplay muted playsinline></video>
    <button onclick="capture()">Verify Face</button>
    <button class="cancel" onclick="closeCamera()">Cancel</button>
  </div>
</div>

<script>
const backendURL = "http://127.0.0.1:5000";
let cameraStream = null;

const products = [
 ["🍎","Apples",3.99], ["🍌","Bananas",2.49],
 ["🥛","Milk",5.99], ["🥚","Eggs",6.49],
 ["🍞","Bread",3.49], ["🍗","Chicken",9.99]
];

const cart = {};
const productDiv = document.getElementById("products");

products.forEach((p,i)=>{
  productDiv.innerHTML += `
  <div class="card">
    <div class="emoji">${p[0]}</div>
    <h4>${p[1]}</h4>
    <p class="price">$${p[2]}</p>
    <button onclick="add(${i})">Add</button>
  </div>`;
});

function add(i){
  cart[i] = (cart[i] || 0) + 1;
  updateCount();
}

function updateCount(){
  cartCount.textContent = Object.values(cart).reduce((a,b)=>a+b,0);
}

function openCart(){
  renderCart();
  cartPanel.classList.add("show");
  backdrop.classList.add("show");
}

function renderCart(){
  let total = 0;
  cartItems.innerHTML = "";
  for(let i in cart){
    total += cart[i] * products[i][2];
    cartItems.innerHTML += `<div class="cart-item">${products[i][1]} x ${cart[i]}</div>`;
  }
  total = total.toFixed(2);
  document.getElementById("total").textContent = total;
  document.getElementById("payAmount").textContent = total;
}

function openPayment(){
  cartPanel.classList.remove("show");
  paymentPanel.classList.add("show");
}

function closePanels(){
  cartPanel.classList.remove("show");
  paymentPanel.classList.remove("show");
  backdrop.classList.remove("show");
}

function updateCard(v){
  cardPreview.textContent = v.replace(/\D/g,"").replace(/(.{4})/g,"$1 ").trim();
}

function pay(){
  const amount = payAmount.textContent;
  const items = Object.values(cart).reduce((a,b)=>a+b,0);

  fetch(`${backendURL}/check-fraud`, {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({ amount, items })
  })
  .then(r=>r.json())
  .then(d=>{
    if(d.status==="SUSPICIOUS"){
      openCamera();
    } else {
      alert("✅ Payment Successful");
      location.reload();
    }
  });
}

function openCamera(){
  cameraModal.classList.add("show");
  document.body.style.overflow="hidden";

  navigator.mediaDevices.getUserMedia({video:true})
    .then(stream=>{
      cameraStream = stream;
      cameraVideo.srcObject = stream;
    });
}

function closeCamera(){
  cameraModal.classList.remove("show");
  document.body.style.overflow="auto";

  if(cameraStream){
    cameraStream.getTracks().forEach(t=>t.stop());
    cameraStream=null;
  }
}

function capture(){
  const canvas = document.createElement("canvas");
  canvas.width = cameraVideo.videoWidth;
  canvas.height = cameraVideo.videoHeight;
  canvas.getContext("2d").drawImage(cameraVideo,0,0);

  canvas.toBlob(blob=>{
    const fd = new FormData();
    fd.append("image",blob);

    fetch(`${backendURL}/verify-face`,{method:"POST",body:fd})
    .then(r=>r.json())
    .then(d=>{
      closeCamera();
      if(d.status==="APPROVED"){
        alert("✅ Identity verified. Payment successful!");
        location.reload();
      } else {
        alert("❌ Face mismatch. Payment blocked!");
      }
    });
  },"image/jpeg");
}
</script>

</body>
</html>
